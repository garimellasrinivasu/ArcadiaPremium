[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA routing — all routes serve index.html
[[redirects]]
  from = "/api/*"
  to = "http://arcadiapremium.duckdns.org:3001/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
