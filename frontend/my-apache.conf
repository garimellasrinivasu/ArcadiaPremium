ServerName localhost

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

<VirtualHost *:80>
    DocumentRoot "/usr/local/apache2/htdocs"
    
    # Route all requests starting with /api to the backend container
    # 'backend' is the service name used in your network/docker-compose
    ProxyPass /api http://backend:8080/api
    ProxyPassReverse /api http://backend:8080/api

    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Handle SPA routing (React/Vue/Angular)
        FallbackResource /index.html
    </Directory>
</VirtualHost>