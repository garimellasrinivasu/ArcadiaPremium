spring:
  application:
    name: arcadia-premium

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:arcadia_premium}
    username: ${DB_USER:arcadia}
    password: ${DB_PASS:arcadia123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  # Email configuration (Gmail example — update with your SMTP credentials)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:garimella.srinivasu@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password-here}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:YXJjYWRpYS1wcmVtaXVtLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u}
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # Gender detection (Python + OpenCV)
  detection:
    python-path: ${PYTHON_PATH:python3}
    script-dir: ${DETECTION_SCRIPT_DIR:}

  # WhatsApp Business API (optional)
  whatsapp:
    enabled: ${WHATSAPP_ENABLED:false}
    api-url: ${WHATSAPP_API_URL:}
    api-token: ${WHATSAPP_API_TOKEN:}

logging:
  level:
    com.arcadia.premium: DEBUG
    org.springframework.security: INFO
