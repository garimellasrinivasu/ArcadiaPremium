name: Continuous Delivery

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Java CI with Maven and Docker", "Frontend CI and Docker"]
    types: [completed]

jobs:
  deploy:
    # Run on manual dispatch OR when a CI workflow succeeds
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Verify BOTH CI workflows passed before deploying
      - name: Check all CI workflows passed
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking that both CI workflows have passed on branch main..."

          # Get latest run for backend CI
          BACKEND_STATUS=$(gh run list --workflow="maven.yml" --branch=main --limit=1 --json conclusion --jq '.[0].conclusion')
          echo "Backend CI status: $BACKEND_STATUS"

          # Get latest run for frontend CI
          FRONTEND_STATUS=$(gh run list --workflow="npm.yml" --branch=main --limit=1 --json conclusion --jq '.[0].conclusion')
          echo "Frontend CI status: $FRONTEND_STATUS"

          if [ "$BACKEND_STATUS" != "success" ] || [ "$FRONTEND_STATUS" != "success" ]; then
            echo "ERROR: Not all CI workflows have passed."
            echo "  Backend: $BACKEND_STATUS"
            echo "  Frontend: $FRONTEND_STATUS"
            echo "Skipping deploy until both pass."
            exit 1
          fi

          echo "Both CI workflows passed. Proceeding with deploy."

      - name: Copy Docker Compose to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/arcadia-app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/arcadia-app
            # Login to registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull latest images
            docker compose pull
            # Restart containers with the new images
            docker compose up -d --remove-orphans
            # Cleanup old unused images to save space
            docker image prune -f
