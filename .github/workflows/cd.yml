name: Continuous Delivery

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Java CI with Maven and Docker", "Frontend CI and Docker"]
    types: [completed]

jobs:
  deploy:
    # Run on manual dispatch OR when a CI workflow succeeds
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Verify BOTH CI workflows passed before deploying
      - name: Check all CI workflows passed
        id: check_ci
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking that both CI workflows have passed on branch main..."

          # Get latest run for backend CI
          BACKEND_STATUS=$(gh run list --workflow="maven.yml" --branch=main --limit=1 --json conclusion --jq '.[0].conclusion')
          echo "Backend CI status: $BACKEND_STATUS"

          # Get latest run for frontend CI
          FRONTEND_STATUS=$(gh run list --workflow="npm.yml" --branch=main --limit=1 --json conclusion --jq '.[0].conclusion')
          echo "Frontend CI status: $FRONTEND_STATUS"

          if [ "$BACKEND_STATUS" != "success" ] || [ "$FRONTEND_STATUS" != "success" ]; then
            echo "Not all CI workflows have passed yet."
            echo "  Backend: $BACKEND_STATUS"
            echo "  Frontend: $FRONTEND_STATUS"
            echo "Skipping deploy for this trigger (waiting for the other to finish)."
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Both CI workflows passed. Proceeding with deploy."
          echo "ready=true" >> $GITHUB_OUTPUT

      - name: Copy Docker Compose to Server
        if: steps.check_ci.outputs.ready == 'true' || github.event_name == 'workflow_dispatch'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,scripts/"
          target: "~/arcadia-app"

      - name: Deploy via SSH
        if: steps.check_ci.outputs.ready == 'true' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/arcadia-app
            # Login to registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull latest images
            docker compose pull
            # Restart containers with the new images
            docker compose up -d --remove-orphans
            # Cleanup old unused images to save space
            docker image prune -f
            
            # Make the backup script executable
            chmod +x ~/arcadia-app/scripts/backup.sh
            
            # Ensure the backup directory exists
            mkdir -p ~/arcadia-backups
            
            # Setup daily backup cron job at 2:00 AM (removes any old backup job first to avoid duplicates)
            (crontab -l 2>/dev/null | grep -v "scripts/backup.sh"; echo "0 2 * * * /bin/bash ~/arcadia-app/scripts/backup.sh >> ~/arcadia-backups/backup.log 2>&1") | crontab -
